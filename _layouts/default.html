<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body data-genre="{{ page.genre }}">
  <!-- ================= HEADER ================= -->
  <header class="site-header">

    <!-- Language Toggle Row (top, centered) -->
    <div class="header-toggle-row">
      <button id="toggle-btn" aria-label="Toggle language">
        <span class="lang-badge" data-lang="en">🇺🇸 EN</span>
        <span class="divider">|</span>
        <span class="lang-badge" data-lang="ja">🇯🇵 日本語</span>
      </button>
    </div>

    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="home-btn">Home</a>
      <div class="site-title">{{ site.title }}</div>
      <div class="header-search-wrap" role="search">
        <label for="header-search" class="visually-hidden">Search recipes by name</label>
        <input
          id="header-search"
          class="header-search-input"
          type="search"
          autocomplete="off"
          placeholder="Search recipes"
          aria-controls="header-search-results"
          aria-expanded="false">
        <ul id="header-search-results" class="header-search-results" role="listbox" hidden></ul>
      </div>
    </div>
  </header>

  <!-- ================= BREADCRUMBS ================= -->
  {% if page.collection == "recipes" %}
  <nav class="breadcrumb-nav" aria-label="Breadcrumb">
    <div class="breadcrumb-inner">
      <a href="{{ '/' | relative_url }}" class="breadcrumb-link">
        Home
      </a>

      <span class="breadcrumb-separator">&gt;</span>

      <span class="breadcrumb-genre">
        {% case page.genre %}
          {% when "main" %}Main Dishes
          {% when "dessert" %}Desserts
          {% when "sauce" %}Sauces
        {% endcase %}
      </span>

      <span class="breadcrumb-separator">&gt;</span>

      <span class="breadcrumb-current">
        {{ page.title_en | default: page.title }}
      </span>
    </div>
  </nav>
  {% endif %}

  <!-- ================= PAGE CONTENT ================= -->
  <main class="page-container">
    {{ content }}
  </main>

  <!-- Recipe index for static client-side search. Generated by Jekyll at build time. -->
  <script id="recipe-data" type="application/json">
[
{% for recipe in site.recipes %}
  {
    "title_en": {{ recipe.title_en | default: recipe.title | jsonify }},
    "title_ja": {{ recipe.title_ja | default: recipe.title | jsonify }},
    "url": {{ recipe.url | relative_url | jsonify }},
    "genre": {{ recipe.genre | jsonify }},
    "ingredients_en": {{ recipe.ingredients_en | jsonify }},
    "ingredients_ja": {{ recipe.ingredients_ja | jsonify }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
]
  </script>

  <!-- ================= SCRIPTS ================= -->
  <script src="{{ '/assets/js/lang-toggle.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/recipe-search.js' | relative_url }}"></script>
</body>
</html>
